<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marta & Pietro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Georgia,serif;
background:#000;
}

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#f8f4ed,#efe6d8);
transition:opacity 1s;
z-index:10;
}

h1{
font-size:60px;
color:#8c6d46;
margin-bottom:10px;
letter-spacing:2px;
}

h2{
font-size:22px;
font-weight:normal;
color:#666;
margin-bottom:50px;
}

button{
padding:18px 45px;
font-size:22px;
border:none;
border-radius:50px;
background:#8c6d46;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

video{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
object-fit:contain;
}

</style>

</head>

<body>

<div id="intro">

<h1>Marta & Pietro</h1>

<h2>25 Giugno 2027</h2>

<button onclick="startVideo()">
💍 Guarda la nostra partecipazione
</button>

</div>

<video
id="video"
controls
playsinline
preload="auto">

<source src="https://res.cloudinary.com/sddyugpi/video/upload/v1784731641/partecipazione_qltjnj.mp4" type="video/mp4">

</video>

<script>

const video=document.getElementById("video");

function startVideo(){

document.getElementById("intro").style.opacity="0";

setTimeout(()=>{

document.getElementById("intro").style.display="none";

video.style.display="block";

video.play();

if(video.requestFullscreen){
video.requestFullscreen();
}

},700);

}

</script>

</body>

</html>
