<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Marta & Pietro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

width:100%;
height:100%;
overflow:hidden;
font-family:Georgia,serif;
background:#000;

}

.page{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background-size:cover;
background-position:center;

transition:1s;

}

#intro{

background-image:url("intro.jpg");

}

#finale{

background-image:url("finale.jpg");

display:none;

color:white;

text-shadow:0 2px 10px black;

}

#video{

display:none;

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:black;

object-fit:contain;

}

h1{

font-size:60px;

margin-bottom:15px;

}

h2{

font-size:24px;

margin-bottom:40px;

}

button{

padding:18px 45px;

font-size:22px;

background:#56644e;

color:white;

border:none;

border-radius:50px;

cursor:pointer;

}

#messaggio{

opacity:0;

transition:2s;

text-align:center;

}

</style>

</head>

<body>

<div id="intro" class="page">

<h1>Marta & Pietro</h1>

<h2>25 Giugno 2027</h2>

<button onclick="start()">

Guarda la nostra partecipazione

</button>

</div>

<video id="video" playsinline controls>

<source src="https://res.cloudinary.com/sddyugpi/video/upload/v1784731641/partecipazione_qltjnj.mp4">

</video>

<div id="finale" class="page">

<div id="messaggio">

<h1>Grazie ❤️</h1>

<h2>

Per essere parte del nostro giorno più bello

</h2>

</div>

</div>

<script>

const video=document.getElementById("video");

function start(){

intro.style.display="none";

video.style.display="block";

video.play();

}

video.onended=function(){

video.style.display="none";

finale.style.display="flex";

setTimeout(()=>{

messaggio.style.opacity=1;

},1000);

}

</script>

</body>

</html>
